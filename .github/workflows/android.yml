name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        working-directory: web_app
        run: npm ci || npm install
        
      - name: Build Web App
        working-directory: web_app
        run: npm run build
        
      - name: Sync Capacitor
        working-directory: web_app
        run: npx cap sync android
        
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Build Android APK
        working-directory: web_app/android
        run: chmod +x ./gradlew && ./gradlew assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: web_app/android/app/build/outputs/apk/debug/app-debug.apk
